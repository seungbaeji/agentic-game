site_name: agentic-game
site_description: LangGraph 기반 phase/event agent workflow runtime 실험
repo_url: https://github.com/seungbaeji/agentic-game

theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Glossary: glossary.md
  - Architecture: architecture.md
  - Runtime Flow: node-flow.md
  - Scenario Details: scenario-details.md
  - Tool Calling Comparison: tool-calling-comparison.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
